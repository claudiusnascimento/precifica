name: Tests

# Only runs on PRs carrying the "ready for tests" label. `synchronize` is
# included so new commits keep being tested for as long as the label stays
# on the PR, not just the moment it's added.
on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]

concurrency:
  group: tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PHP_VERSION: '8.3'

jobs:
  php-tests:
    name: PHP tests (Pest)
    if: contains(github.event.pull_request.labels.*.name, 'ready for tests')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, bcmath, dom, fileinfo, curl, pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Copy .env
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate app key
        run: php artisan key:generate

      - name: Run PHP tests
        run: composer test

  js-unit-tests:
    name: JS unit tests (Vitest)
    if: contains(github.event.pull_request.labels.*.name, 'ready for tests')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run JS unit tests
        run: npm run test:js

  e2e-tests:
    name: E2E tests (Playwright)
    if: contains(github.event.pull_request.labels.*.name, 'ready for tests')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, bcmath, dom, fileinfo, curl, pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Copy .env
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install npm dependencies
        run: npm ci

      - name: Generate app key
        run: php artisan key:generate

      - name: Create SQLite database
        run: touch database/database.sqlite

      - name: Run migrations
        run: php artisan migrate --force

      - name: Build frontend assets
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Laravel server
        run: php artisan serve --port=8080 &

      - name: Wait for server
        run: timeout 30 bash -c 'until curl -sf http://localhost:8080 >/dev/null; do sleep 1; done'

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
